services:
  ecu-twin:
    build: .
    container_name: ecu-twin
    ports:
      - "8000:8000"
    volumes:
      # прошивка M30 монтируется внутрь как /data/rom.bin (только чтение)
      - "../m30/infiniti90m30at (1).bin:/data/rom.bin:ro"
      # ЖИВЫЕ тома: код берётся прямо с диска, пересборка не нужна
      - "./backend:/app/backend"
      - "./frontend:/app/frontend"
    environment:
      - ECU_ROM=/data/rom.bin
      - ECU_ROM_BASE=0x8000
    # --reload: бэкенд сам перечитывает изменения
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
